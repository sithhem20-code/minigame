<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Games Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1> Mini Games Hub</h1>
    <p>Select a game to play</p>

    <div class="games">

        <div class="card">
            <h2>🎲 Guess the Number</h2>
            <p>Can you guess the secret number?</p>
            <a href="guess.html">
                <button>Play</button>
            </a>
        </div>

        <div class="card">
            <h2>❌ Tic Tac Toe</h2>
            <p>Play against your friend.</p>
            <a href="tictactoe.html">
                <button>Play</button>
            </a>
        </div>

        <div class="card">
            <h2>🐍 Snake Game</h2>
            <p>Eat food and grow as long as possible!</p>
            <a href="snake.html">
                <button>Play</button>
            </a>
        </div>

    </div>
</div>
<div class="mobile-controls">
    <button id="upBtn">⬆️</button>


<script src="script.js"></script>

</body>
</html>
