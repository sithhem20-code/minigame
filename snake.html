<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Snake Game</title>

    <link rel="stylesheet" href="snake.css">
</head>


<body>

<div class="mobile-controls">
    <button id="upBtn">⬆️</button>

    <div>
        <button id="leftBtn">⬅️</button>
        <button id="downBtn">⬇️</button>
        <button id="rightBtn">➡️</button>
    </div>
</div>

<div class="game-container">


    <header>

        <h1>🐍 Snake</h1>

        <div class="stats">

            <span>
                Score:
                <b id="score">0</b>
            </span>


            <span>
                High:
                <b id="highScore">0</b>
            </span>

        </div>

    </header>



    <div class="controls">


        <label>
            Difficulty:

            <select id="difficulty">

                <option value="easy">
                    Easy
                </option>


                <option value="medium" selected>
                    Medium
                </option>


                <option value="hard">
                    Hard
                </option>


            </select>


        </label>


        <button id="pauseBtn">
            ⏸ Pause
        </button>


    </div>
    



    <canvas id="gameCanvas"
        width="400"
        height="400">
    </canvas>



    <div id="message">

    </div>



    <footer>


        <button id="restartBtn">
            🔄 Restart
        </button>


        <button id="homeBtn">
            🏠 Home
        </button>


    </footer>



</div>

<div class="mobile-controls">
    <button id="upBtn">⬆️</button>

    <div>
        <button id="leftBtn">⬅️</button>
        <button id="downBtn">⬇️</button>
        <button id="rightBtn">➡️</button>
    </div>
</div>


<script src="snake.js"></script>

</body>

</html>
